<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<script>
    function login() {
        var num = document.hi.num.value;
        var pass = document.hi.pass.value;

        const ph = localStorage.getItem("ph");
        const password1 = localStorage.getItem("password1");

        if (num == "" || pass == "") {
            document.getElementById("one").innerHTML = " &#9888; Enter Number and Password First";
            return false;
        }
        else if (num != ph || pass != password1) {
            alert("Enter a Valid Number and Password")
            return false;
        }
    }
</script>
<style>
    body {
        background-image: url(https://linchpinsales.com/wp-content/uploads/2018/10/background-1400x700-man-on-laptop.jpg);
        background-repeat: no-repeat;

    }

    .full {
        display: flex;
        justify-content: center;
        margin-top: 170px;
    }

    form {
        background-image: url(https://images.ctfassets.net/co0pvta7hzrh/U7naGAUU8AroSP7R3koHv/7a4c8ab3868f74bb197c1069401aac26/pre-registration_form_template_Thumbnail.png);
        padding: 2.8%;
        font-size: 20px;
        border-radius: 2%;
        color: #885fbb;
        background-size: cover;
    }

    input {
        height: 30px;
        width: 320px;
        margin: 3px 0px 15px 0px;
    }

    #button {
        height: 40px;
        width: 150px;
        margin-left: 85px;
        margin-top: 5px;
        margin-bottom: 0px;
        font-size: 25px;
        border-radius: 13px;
        background-color: rgba(19, 245, 19, 0.918);
        color: blue;
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        font-weight: bold;
        letter-spacing: 0.3px;
    }

    span {
        color: red;
    }
</style>

<body>
    <div class="full">
        <form action="Msg.html" name="hi" onsubmit="return login()">
            Ph Number <br><input type="text" name="num"><span id="one"></span><br>
            Password <br><input type="password" name="pass"><br>
            <input id="button" type="submit" value="LOG IN">
        </form>
    </div>
</body>

</html>
